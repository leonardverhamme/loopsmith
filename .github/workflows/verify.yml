name: Verify

on:
  workflow_call:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    env:
      CODEX_HOME: ${{ github.workspace }}
      VERIFY_DIST_DIR: verify-dist

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify Python sources compile
        run: python -m compileall agentctl workflow-tools scripts

      - name: Run agentctl tests
        run: python -m unittest discover -s agentctl/tests -p "test_*.py"

      - name: Run browser smoke regression
        if: runner.os == 'Windows'
        env:
          AGENTCTL_RUN_BROWSER_SMOKE: "1"
          AGENTCTL_BROWSER: "msedge"
        run: python -m unittest discover -s agentctl/tests -p "test_browser_smoke.py"

      - name: Run workflow-tools tests
        run: python -m unittest discover -s workflow-tools/tests -p "test_*.py"

      - name: Smoke maintenance audit
        run: python agentctl/agentctl.py maintenance audit --json

      - name: Build package artifacts
        run: |
          python -c "import shutil; from pathlib import Path; path = Path(r'${{ env.VERIFY_DIST_DIR }}'); shutil.rmtree(path, ignore_errors=True)"
          python -m pip install build
          python -m build --sdist --wheel --outdir "$VERIFY_DIST_DIR"

  bundle-smoke:
    name: Bundle smoke test
    runs-on: ubuntu-latest
    needs: [verify]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bundle into isolated CODEX_HOME
        env:
          BUNDLE_CODEX_HOME: ${{ runner.temp }}/agent-cli-os-codex-home
        run: python scripts/install_bundle.py --codex-home "$BUNDLE_CODEX_HOME"

      - name: Smoke installed Agent CLI OS commands
        env:
          BUNDLE_CODEX_HOME: ${{ runner.temp }}/agent-cli-os-codex-home
        run: |
          export CODEX_HOME="$BUNDLE_CODEX_HOME"
          python "$BUNDLE_CODEX_HOME/agentctl/agentctl.py" doctor --json
          python "$BUNDLE_CODEX_HOME/agentctl/agentctl.py" capabilities --json
          python "$BUNDLE_CODEX_HOME/agentctl/agentctl.py" maintenance audit --json

      - name: Upload maintenance artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-cli-os-maintenance-report
          path: ${{ runner.temp }}/agent-cli-os-codex-home/docs/agent-cli-os/maintenance-report.json
          retention-days: 14

  package-smoke:
    name: Package smoke test
    runs-on: ubuntu-latest
    needs: [verify]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create venv and install package
        run: |
          python -m venv .venv-package
          . .venv-package/bin/activate
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Smoke package wrapper bootstrap help
        env:
          BUNDLE_CODEX_HOME: ${{ runner.temp }}/agent-cli-os-package-home
        run: |
          . .venv-package/bin/activate
          agentcli bootstrap --help
          loopsmith bootstrap --help
          CODEX_HOME="$BUNDLE_CODEX_HOME" agentcli bootstrap --source-root "$GITHUB_WORKSPACE"
          export CODEX_HOME="$BUNDLE_CODEX_HOME"
          python "$BUNDLE_CODEX_HOME/agentctl/agentctl.py" doctor --json
          python "$BUNDLE_CODEX_HOME/agentctl/agentctl.py" self-check --json
