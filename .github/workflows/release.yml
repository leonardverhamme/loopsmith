name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CODEX_HOME: ${{ github.workspace }}
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify Python sources compile
        run: python -m compileall agentctl workflow-tools scripts

      - name: Run agentctl tests
        run: python -m unittest discover -s agentctl/tests -p "test_*.py"

      - name: Run workflow-tools tests
        run: python -m unittest discover -s workflow-tools/tests -p "test_*.py"

      - name: Smoke maintenance audit
        run: python agentctl/agentctl.py maintenance audit --json

      - name: Build release bundle
        run: python scripts/build_release_bundle.py --version "$RELEASE_VERSION" --output-dir dist

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentctl-platform-${{ env.RELEASE_VERSION }}
          path: |
            dist/*.zip
            dist/*.sha256
          retention-days: 30

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_VERSION" >/dev/null 2>&1; then
            gh release upload "$RELEASE_VERSION" dist/* --clobber
          else
            gh release create "$RELEASE_VERSION" dist/* --title "$RELEASE_VERSION" --generate-notes
          fi
