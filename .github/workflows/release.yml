name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name || inputs.version }}
  cancel-in-progress: false

jobs:
  verify:
    uses: ./.github/workflows/verify.yml

  release:
    runs-on: ubuntu-latest
    needs: verify
    env:
      CODEX_HOME: ${{ github.workspace }}
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Python package artifacts
        run: |
          python -m pip install build
          python -m build --sdist --wheel --outdir dist

      - name: Verify Python distributions
        run: |
          python -m pip install twine
          twine check dist/*

      - name: Build release bundle
        run: python scripts/build_release_bundle.py --version "$RELEASE_VERSION" --output-dir dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-cli-os-${{ env.RELEASE_VERSION }}
          path: |
            dist/*.zip
            dist/*.sha256
            dist/*.whl
            dist/*.tar.gz
          retention-days: 30

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_VERSION" >/dev/null 2>&1; then
            gh release upload "$RELEASE_VERSION" dist/* --clobber
          else
            gh release create "$RELEASE_VERSION" dist/* --title "$RELEASE_VERSION" --generate-notes
          fi

      - name: Smoke bootstrap from released artifacts
        env:
          BUNDLE_CODEX_HOME: ${{ runner.temp }}/agent-cli-os-release-home
        run: |
          python -m venv .venv-release
          . .venv-release/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          CODEX_HOME="$BUNDLE_CODEX_HOME" agentcli bootstrap --version "$RELEASE_VERSION"
          export CODEX_HOME="$BUNDLE_CODEX_HOME"
          python "$BUNDLE_CODEX_HOME/agentctl/agentctl.py" doctor --json
          python "$BUNDLE_CODEX_HOME/agentctl/agentctl.py" self-check --json
