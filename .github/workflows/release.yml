name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name || inputs.version }}
  cancel-in-progress: false

jobs:
  verify:
    uses: ./.github/workflows/verify.yml

  release:
    runs-on: ubuntu-latest
    needs: verify
    environment: pypi
    env:
      CODEX_HOME: ${{ github.workspace }}
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
      RELEASE_DIR: release-dist
      PYTHON_DIST_DIR: release-dist/python
      BUNDLE_DIST_DIR: release-dist/bundle
      RELEASE_TITLE: Agent CLI OS ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
      PYPI_PROJECT: agent-cli-os
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve package version
        run: |
          python <<'PY' >> "$GITHUB_ENV"
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(f"PACKAGE_VERSION={data['project']['version']}")
          PY

      - name: Clean generated packaging outputs
        run: |
          python -c "import shutil; from pathlib import Path; [shutil.rmtree(path, ignore_errors=True) for path in [Path(r'${{ env.RELEASE_DIR }}'), Path('build'), *Path('.').glob('*.egg-info'), *Path('.').glob('*.dist-info')]]"

      - name: Build Python package artifacts
        run: |
          mkdir -p "$PYTHON_DIST_DIR"
          python -m pip install build
          python -m build --sdist --wheel --outdir "$PYTHON_DIST_DIR"

      - name: Verify Python distributions
        run: |
          python -m pip install twine
          twine check "$PYTHON_DIST_DIR"/*.whl "$PYTHON_DIST_DIR"/*.tar.gz

      - name: Build release bundle
        run: |
          mkdir -p "$BUNDLE_DIST_DIR"
          python scripts/build_release_bundle.py --version "$RELEASE_VERSION" --output-dir "$BUNDLE_DIST_DIR"

      - name: Verify release artifact names
        run: |
          ls -R "$RELEASE_DIR"
          test -f "$PYTHON_DIST_DIR/agent_cli_os-$PACKAGE_VERSION-py3-none-any.whl"
          test -f "$PYTHON_DIST_DIR/agent_cli_os-$PACKAGE_VERSION.tar.gz"
          test -f "$BUNDLE_DIST_DIR/agent-cli-os-bundle-$RELEASE_VERSION.zip"
          test -f "$BUNDLE_DIST_DIR/agent-cli-os-bundle-$RELEASE_VERSION.zip.sha256"
          if find "$RELEASE_DIR" -maxdepth 1 -type f \( -name 'loopsmith*' -o -name 'agentctl*' \) | grep -q .; then
            echo "Legacy-named release artifacts are present in $RELEASE_DIR"
            exit 1
          fi

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-cli-os-${{ env.RELEASE_VERSION }}
          path: |
            ${{ env.BUNDLE_DIST_DIR }}/*.zip
            ${{ env.BUNDLE_DIST_DIR }}/*.sha256
            ${{ env.PYTHON_DIST_DIR }}/*.whl
            ${{ env.PYTHON_DIST_DIR }}/*.tar.gz
          retention-days: 30

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_VERSION" >/dev/null 2>&1; then
            gh release edit "$RELEASE_VERSION" --title "$RELEASE_TITLE"
            gh release upload "$RELEASE_VERSION" "$PYTHON_DIST_DIR"/* "$BUNDLE_DIST_DIR"/* --clobber
          else
            gh release create "$RELEASE_VERSION" "$PYTHON_DIST_DIR"/* "$BUNDLE_DIST_DIR"/* --title "$RELEASE_TITLE" --generate-notes
          fi

      - name: Smoke bootstrap from released artifacts
        env:
          BUNDLE_CODEX_HOME: ${{ runner.temp }}/agent-cli-os-release-home
        run: |
          python -m venv .venv-release
          . .venv-release/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "$PYTHON_DIST_DIR"/*.whl
          CODEX_HOME="$BUNDLE_CODEX_HOME" agentcli bootstrap --version "$RELEASE_VERSION"
          export CODEX_HOME="$BUNDLE_CODEX_HOME"
          python "$BUNDLE_CODEX_HOME/agentctl/agentctl.py" doctor --json
          python "$BUNDLE_CODEX_HOME/agentctl/agentctl.py" self-check --json

      - name: Publish to PyPI via trusted publisher
        id: pypi_publish_trusted
        if: env.PYPI_API_TOKEN == ''
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ env.PYTHON_DIST_DIR }}/

      - name: Publish to PyPI via API token fallback
        id: pypi_publish_token
        if: env.PYPI_API_TOKEN != ''
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ env.PYTHON_DIST_DIR }}/
          user: __token__
          password: ${{ env.PYPI_API_TOKEN }}

      - name: Wait for live PyPI installability
        if: steps.pypi_publish_trusted.outcome == 'success' || steps.pypi_publish_token.outcome == 'success'
        run: python scripts/check_pypi_release.py --package "$PYPI_PROJECT" --version "$PACKAGE_VERSION" --timeout 180 --interval 10

      - name: Report PyPI publish drift
        if: steps.pypi_publish_trusted.outcome != 'success' && steps.pypi_publish_token.outcome != 'success'
        run: |
          if [ -n "$PYPI_API_TOKEN" ]; then
            echo "::warning::PyPI upload did not succeed with the configured PYPI_API_TOKEN secret. GitHub release assets were published, but PyPI is still not live."
          else
            echo "::warning::PyPI trusted publishing is not configured for leonardverhamme/agent-cli-os/.github/workflows/release.yml. GitHub release assets were published, but PyPI upload needs a matching trusted publisher entry."
          fi
          {
            echo "## PyPI publish skipped"
            echo
            echo "GitHub release assets were published successfully."
            if [ -n "$PYPI_API_TOKEN" ]; then
              echo "PyPI upload was attempted with the \`PYPI_API_TOKEN\` secret but did not succeed."
              echo "Check that the token belongs to the \`agent-cli-os\` project and still has upload permission."
            else
              echo "PyPI rejected trusted publishing because no matching publisher was found for:"
              echo "- repository: \`leonardverhamme/agent-cli-os\`"
              echo "- workflow: \`.github/workflows/release.yml\`"
              echo "- environment: \`pypi\`"
              echo
              echo "Update the PyPI trusted publisher entry to match this repo/workflow/environment, then rerun the release."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
